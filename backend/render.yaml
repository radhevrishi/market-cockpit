services:
  - type: web
    name: market-cockpit-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
    plan: free
    region: oregon
