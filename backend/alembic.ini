# Alembic Configuration
# This file is the template used to generate migration scripts

[alembic]
# path to migration scripts
script_location = app/alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepended_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to python's datetime.datetime.now() function to select
# an alternate timezone. The default is None, which uses UTC without timezone.

# timezone =

# max length of characters to apply to the
# "slug" field of the revision message.
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file to be detected as revisions
# in the versions/ directory
allow_partial_revision = false

# set to 'true' to compare type of server default between current and revisions, or 'false' to take default types
# from the ALL type's ddl_compile output
compare_type = false

# compare server default values when creating the migration by running the
# following command. It uses the "getdialect()" function from
# sqlalchemy to acquire the dialect.
compare_server_default = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
