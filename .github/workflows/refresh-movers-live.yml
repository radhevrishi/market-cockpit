name: Refresh Movers (live intraday)

# THE REAL FIX for stale movers. Railway's datacenter IP is blocked by Yahoo
# (yahoo:0), so server-side live fetch fails and the route falls back to ~12h
# old BHAVCOPY/EOD data. GitHub runners have a clean IP that CAN reach Yahoo,
# so we capture LIVE quotes here and push them to KV (nse-movers-live:v1:latest).
# The /api/market/quotes route serves this fresh blob during market hours.

on:
  workflow_dispatch: {}   # manual run button (used to verify)
  # Schedule removed 2026-06-10: live movers scraping now runs on the
  # Cloudflare Worker cron (workers/mc-movers, */5 3-10 * * 1-5) which is
  # punctual — GitHub cron starvation fired only ~2 of ~75 expected runs/day.
  # This workflow remains as a manual backup via the Run workflow button.

concurrency:
  group: refresh-movers-live
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Capture live movers from clean IP → KV
        id: main
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$UPSTASH_REDIS_REST_URL" ] || [ -z "$UPSTASH_REDIS_REST_TOKEN" ]; then
            echo "::error title=Missing secrets::Add UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN in Settings → Secrets and variables → Actions."
            exit 1
          fi
          node .github/scripts/scrape-movers-live.mjs

      - name: Heartbeat (always run)
        if: always()
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
        run: |
          # 10y-ops Section 7.3: POST heartbeat so mc-guardian detects silent stops.
          BASE="${CRON_BASE_URL:-https://market-cockpit-production.up.railway.app}"
          OK="true"
          if [[ "${{ steps.main.outcome }}" != "success" ]]; then OK="false"; fi
          curl -s --max-time 15 -X POST "$BASE/api/v1/cron/heartbeat" \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"refresh-movers-live\",\"phase\":\"end\",\"ok\":$OK,\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            -o /dev/null -w "heartbeat %{http_code}\n" || true
