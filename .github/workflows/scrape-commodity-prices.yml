name: Scrape Commodity Prices (4×/day)

# ──────────────────────────────────────────────────────────────────────────────
# PATCH 0740 — Commodity price ingestion for /transmission via GH Actions.
# Batched Yahoo Finance call for all 37 commodity + equity-proxy symbols,
# results written to Upstash. Vercel /api/v1/transmission route reads
# from KV instead of fanning out 37 Yahoo calls per request.
#
# Required GitHub Actions secrets:
#   UPSTASH_REDIS_REST_URL    — same value as Vercel env var
#   UPSTASH_REDIS_REST_TOKEN  — same value as Vercel env var
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # PATCH 0977 — cut 4→2/day due to Vercel fair-use block.
    # Commodities don't move that fast intraday for this app's purpose;
    # 2 snapshots/day (morning + evening) are enough.
    - cron: '15 1 * * *'    # 06:45 IST — morning
    - cron: '15 13 * * *'  # 1101sss doubled from above
    - cron: '45 14 * * *'   # 20:15 IST — evening
    - cron: '45 2 * * *'  # 1101sss doubled from above
  workflow_dispatch: {}

concurrency:
  group: scrape-commodity-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        id: main
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$UPSTASH_REDIS_REST_URL" ] || [ -z "$UPSTASH_REDIS_REST_TOKEN" ]; then
            echo "::error title=Missing secrets::Add UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN in Settings → Secrets and variables → Actions."
            exit 1
          fi
          node .github/scripts/scrape-commodity-prices.mjs

      - name: Heartbeat (always run)
        if: always()
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
        run: |
          # 10y-ops Section 7.3: POST heartbeat so mc-guardian detects silent stops.
          BASE="${CRON_BASE_URL:-https://market-cockpit-production.up.railway.app}"
          OK="true"
          if [[ "${{ steps.main.outcome }}" != "success" ]]; then OK="false"; fi
          curl -s --max-time 15 -X POST "$BASE/api/v1/cron/heartbeat" \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"scrape-commodity-prices\",\"phase\":\"end\",\"ok\":$OK,\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            -o /dev/null -w "heartbeat %{http_code}\n" || true
