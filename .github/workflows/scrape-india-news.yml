name: Scrape India News (4×/day)

# ──────────────────────────────────────────────────────────────────────────────
# PATCH 0738 — Indian financial news ingestion via GitHub Actions free CPU.
# Fans out across ET Markets, Mint, Moneycontrol, Business Standard, NDTV
# Profit RSS feeds. Parses entries, writes a consolidated blob to Upstash
# Redis. Vercel /api/v1/news-india/[ticker] route reads the blob and merges
# matched entries into the response. Zero Vercel CPU used for ingestion.
#
# Required GitHub Actions secrets:
#   UPSTASH_REDIS_REST_URL    — same value as Vercel env var
#   UPSTASH_REDIS_REST_TOKEN  — same value as Vercel env var
#   (Settings → Secrets and variables → Actions → New repository secret)
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # PATCH 0977 — cut 4→2/day due to Vercel fair-use block.
    # Keep morning (06:30 IST) + post-close (20:00 IST). Mid-session
    # runs dropped — interactive Refresh button still works.
    - cron: '0 1 * * *'    # 06:30 IST — morning
    - cron: '0 13 * * *'  # 1101sss doubled from above
    - cron: '30 14 * * *'  # 20:00 IST — evening
    - cron: '30 2 * * *'  # 1101sss doubled from above
  workflow_dispatch: {}    # manual trigger from GitHub UI

concurrency:
  group: scrape-india-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        id: main
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$UPSTASH_REDIS_REST_URL" ] || [ -z "$UPSTASH_REDIS_REST_TOKEN" ]; then
            echo "::error title=Missing secrets::Add UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN in Settings → Secrets and variables → Actions."
            exit 1
          fi
          node .github/scripts/scrape-india-news.mjs

      - name: Heartbeat (always run)
        if: always()
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
        run: |
          # 10y-ops Section 7.3: POST heartbeat so mc-guardian detects silent stops.
          BASE="${CRON_BASE_URL:-https://market-cockpit-production.up.railway.app}"
          OK="true"
          if [[ "${{ steps.main.outcome }}" != "success" ]]; then OK="false"; fi
          curl -s --max-time 15 -X POST "$BASE/api/v1/cron/heartbeat" \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"scrape-india-news\",\"phase\":\"end\",\"ok\":$OK,\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            -o /dev/null -w "heartbeat %{http_code}\n" || true
