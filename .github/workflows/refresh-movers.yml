name: Refresh Movers (2x/day post-close)

# EXTRA safety net. The Movers Refresh button already force-fetches on demand
# (via ?refresh=1) and the NSE-indices scrape runs independently. This job simply
# forces the /api/market/quotes route to recompute fresh (bypassing its in-memory
# cache) so the home Movers widget shows the latest NSE close without a manual click.

on:
  schedule:
    # PATCH zzz103 — Intraday warmers added so Railway's in-memory cache
    # stays hot during NSE hours. The Cloudflare Worker mc-movers handles
    # the actual KV refresh every 5min; these crons keep Railway pre-warmed
    # so the homepage Top Movers widget doesn't pay the 25-30s cold rebuild.
    - cron: '30 3 * * 1-5'    # 09:00 IST — pre-open warm
    - cron: '30 5 * * 1-5'    # 11:00 IST — mid-morning warm
    - cron: '30 7 * * 1-5'    # 13:00 IST — mid-day warm
    - cron: '0 9 * * 1-5'     # 14:30 IST — pre-close warm
    # Post-close refreshes (final EOD bhavcopy attribution)
    - cron: '15 10 * * 1-5'   # 15:45 IST (Mon-Fri) - just after close
    - cron: '30 13 * * 1-5'   # 19:00 IST (Mon-Fri) - after final EOD bhavcopy
  workflow_dispatch: {}

concurrency:
  group: refresh-movers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Force-refresh movers (India + USA)
        id: refresh
        env:
          BASE: ${{ secrets.CRON_BASE_URL }}
        run: |
          # 10y-ops: override-able via CRON_BASE_URL repo secret; fallback to live Railway host so workflow never silently breaks if the secret is unset.
          BASE="${BASE:-https://market-cockpit-production.up.railway.app}"
          # PATCH 1101s — Resilience hardening so the job stops failing during
          # transient Railway redeploys / cold-start latency on /api/market/quotes.
          # Each market gets 3 retries with backoff (2s/8s/20s). 2xx OR 4xx ends
          # the retry loop (4xx means "endpoint responded, just rejected input"
          # which is not a refresh failure). 5xx triggers retry. After all
          # retries, soft-pass — log status but DO NOT fail the whole workflow
          # because a single transient miss shouldn't break the heartbeat chain.
          refresh_one() {
            local market="$1"
            local url="${BASE}/api/market/quotes?market=${market}&refresh=1"
            local attempt=0
            local status="000"
            local delays=(2 8 20)
            while [ $attempt -lt 3 ]; do
              status=$(curl -sS --max-time 90 -o /dev/null -w "%{http_code}" "$url" || echo "000")
              echo "${market} attempt $((attempt+1)): ${status}"
              # Accept any 2xx or 4xx (4xx = endpoint up but rejected)
              if [[ "$status" == 2* ]] || [[ "$status" == 4* ]]; then
                echo "${market} OK"
                return 0
              fi
              attempt=$((attempt+1))
              if [ $attempt -lt 3 ]; then
                sleep "${delays[$((attempt-1))]}"
              fi
            done
            echo "${market} FINAL=${status} (soft-pass after 3 retries)"
            # Don't exit non-zero — heartbeat will surface the failure.
            return 0
          }
          refresh_one india
          refresh_one us

      - name: Heartbeat (always run)
        if: always()
        env:
          BASE: ${{ secrets.CRON_BASE_URL }}
        run: |
          # 10y-ops Section 7.3: POST heartbeat so mc-guardian detects silent stops.
          # Best-effort — never fail the workflow because the heartbeat endpoint is down.
          BASE="${BASE:-https://market-cockpit-production.up.railway.app}"
          OK="true"
          if [[ "${{ steps.refresh.outcome }}" != "success" ]]; then OK="false"; fi
          curl -s --max-time 15 -X POST "$BASE/api/v1/cron/heartbeat" \
            -H 'Content-Type: application/json' \
            -d "{\"name\":\"refresh-movers\",\"phase\":\"end\",\"ok\":$OK,\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            -o /dev/null -w "heartbeat %{http_code}\n" || true
