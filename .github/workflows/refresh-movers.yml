name: Refresh Movers (2x/day post-close)

# EXTRA safety net. The Movers Refresh button already force-fetches on demand
# (via ?refresh=1) and the NSE-indices scrape runs independently. This job simply
# forces the /api/market/quotes route to recompute fresh (bypassing its in-memory
# cache) so the home Movers widget shows the latest NSE close without a manual click.

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 15:45 IST (Mon-Fri) - just after close
    - cron: '30 13 * * 1-5'   # 19:00 IST (Mon-Fri) - after final EOD bhavcopy
  workflow_dispatch: {}

concurrency:
  group: refresh-movers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Force-refresh movers (India + USA)
        run: |
          BASE="https://market-cockpit-production.up.railway.app"
          curl -fsS "$BASE/api/market/quotes?market=india&refresh=1" -o /dev/null -w "india %{http_code}\n" || true
          curl -fsS "$BASE/api/market/quotes?market=us&refresh=1" -o /dev/null -w "us %{http_code}\n" || true
