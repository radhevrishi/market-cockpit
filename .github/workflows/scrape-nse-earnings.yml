# ═══════════════════════════════════════════════════════════════════════════
# NSE Earnings Calendar scraper — patch 0133
#
# Hits NSE corporate-financial-results API every 30 min during IST market
# hours.  GitHub Actions runners get rotating IPs that NSE blocks far less
# than Vercel serverless IPs.  Pushes canonical payload to Upstash KV
# where the Vercel /api/v1/earnings/calendar route reads it.
#
# Requires repo secrets:
#   UPSTASH_REDIS_REST_URL   — same one your Next.js app uses
#   UPSTASH_REDIS_REST_TOKEN — same one your Next.js app uses
# Settings → Secrets and variables → Actions → New repository secret
# ═══════════════════════════════════════════════════════════════════════════

name: NSE Earnings Calendar Scrape

on:
  schedule:
    # Every 30 minutes, 03:00 → 13:00 UTC (08:30 → 18:30 IST)
    # Covers pre-open through post-close result-filing window.
    - cron: '*/30 3-13 * * 1-6'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Days to look back (default 90)'
        required: false
        default: '90'

concurrency:
  group: scrape-nse-earnings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run NSE scraper
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          BACKFILL_DAYS:            ${{ github.event.inputs.backfill_days || '90' }}
        run: node scripts/scrape-nse-earnings.mjs

      - name: Report status
        if: always()
        run: |
          echo "Scrape job finished with status: ${{ job.status }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
