name = "mc-guardian"
main = "index.js"
compatibility_date = "2026-01-01"

# Health monitor for Market Cockpit. Probes the portal + scraper every 10 min,
# sends a Telegram message when something breaks, and again when it recovers.
[triggers]
crons = ["*/10 * * * *"]

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
