<style>

<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <h1>Catalyst Scorecard — 62 India Growth Stocks</h1>
        <div class="tagline">Growth catalysts + Management quality + Moat quality — three separate lenses</div>
      </div>
      <div class="toolbar-actions">
        <button class="btn btn-pdf" onclick="window.print()">⬇ Download as PDF</button>
        <button class="btn" id="themeToggle">🌙 Dark Mode</button>
        <button class="btn" onclick="document.documentElement.scrollTo({top:0,behavior:'smooth'})">↑ Back to Top</button>
      </div>
    </div>
    <div class="nav-fixed">
      <button class="nav-btn" id="prevCo" title="Previous company (↑)">↑</button>
      <button class="nav-btn" id="nextCo" title="Next company (↓)">↓</button>
    </div>
    <div class="legend-row">
      <div class="legend-scope">Click a tier to filter <span id="tierScope">(applies to Catalyst score)</span></div>
      <div class="legend">
        <span class="legend-item lg-all active" data-tier="all">All</span>
        <span class="legend-item lg-s90" data-tier="9">9.0+ Elite</span>
        <span class="legend-item lg-s85" data-tier="8.5">8.5 Strong</span>
        <span class="legend-item lg-s80" data-tier="8">8.0 Solid</span>
        <span class="legend-item lg-s75" data-tier="7.5">7.5 Fair</span>
        <span class="legend-item lg-s70" data-tier="7">7.0 Watch</span>
        <span class="legend-item lg-s60" data-tier="6">6.0 Weak</span>
        <span class="legend-item lg-s55" data-tier="special">Special</span>
      </div>
    </div>
  </div>
  <div class="filter-bar">
    <input id="search" placeholder="Search company, sector, catalyst...">
    <select id="sort">
      <option value="composite">Sort: Composite (Cat+Mgmt+Moat)</option>
      <option value="cat">Sort: Catalyst score</option>
      <option value="mgmt">Sort: Management score</option>
      <option value="moat">Sort: Moat score</option>
      <option value="name">Sort: Name (A-Z)</option>
    </select>
    <select id="tierScoreDim">
      <option value="cat">Tier filter on: Catalyst</option>
      <option value="mgmt">Tier filter on: Management</option>
      <option value="moat">Tier filter on: Moat</option>
    </select>
    <span class="count" id="count"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const companies = [
  { n:"Azad Engineering", sector:"Aerospace & Defence", metrics:"Mcap ₹15,991Cr · P/E 72 · ROCE 11% · OPM 37%",
    cat:9, mgmt:8, moat:9,
    hero:"Mitsubishi Heavy Industries 8-year SINGLE-SOURCE LTCPA (signed March 2026) for hot-section Nozzle Vanes Segments — a part previously manufactured in-house by MHI. Moves Azad from cold-section compressor airfoils into the far-more-critical combustion HOT SECTION of the gas turbine, on a combined MHI contract base now at USD 156M.",
    subs:[
      "Baker Hughes O&G ~100× revenue runway — dedicated 7,600 sqm Baker Hughes plant inaugurated 23 April 2026 with production starting same day and 50-60% of machines already installed. Strategic Supply Agreement amended same day for a significant increase in annual demand. O&G revenue was under ₹10 cr FY26 but order book is >$100M (~₹850 cr) and management expects to breach ₹100 cr in the next couple of years — roughly the pace Aerospace scaled.",
      "8 dedicated lean OEM plants at Tunikibollaram Phase 1 (~94,900 sq m) — 4 already inaugurated (latest for Baker Hughes April 2026), remaining 4 on track for FY27. ₹450-500 cr machinery deployment at a blended asset turn of 1.7-2.0×. Q1 FY27 is called a 'churnout month' when metal flow begins.",
      "Rolls-Royce first qualification batch H2 FY27 — the ~2.5-year qualification cycle for civil aircraft engine airfoils concludes then, with supply momentum building from Q4 FY27 or early FY28. Adds a new aerospace OEM relationship on top of GE, Honeywell and Eaton, plus a seven-year defence engine contract already in place.",
      "GTRE (DRDO) India's first indigenous jet engine near delivery — Advanced Turbo Gas Generator program was ~75% complete Q3 FY26 and by Q4 delivery had moved from 'years to months, now weeks'. Single-source, end-to-end manufacturing and assembly contract that elevates Azad from component maker to integrated propulsion-system supplier for a classified national defence program.",
      "Pratt & Whitney Canada Master Terms Agreement + Purchase Agreement signed 18 November 2025 — for development and manufacturing of aircraft engine components. Pratt's India Head stated intent to increase delivery from India by 10× after the US-India trade deal. Qualification cycle follows the same ~2.5-year Rolls-Royce path, adding a second new aerospace OEM in the pipeline.",
      "Safran Aircraft Engines MOU signed — technical assessment complete, management expects contract conversion 'very soon'. Third new aerospace OEM engagement, mirroring the early-stage journey previously seen with GE, Mitsubishi and Siemens.",
      "Arabelle Solutions (EDF) nuclear turbine airfoils — Azad is qualified by EDF as an approved GLOBAL supplier and is already supplying critical rotating and stationary components under a USD 40M supply agreement. Positions Azad as one of the only qualified Indian partners in a segment where nuclear new-build activity is accelerating globally.",
      "Energy wallet share only 1-1.5% of customer spend — even at full ramp-up of existing capacity it stays single-digit. Within less than a year of signing an initial contract, a Phase 2 of similar value was signed with one customer, demonstrating how quickly wallet share can compound from a tiny base.",
      "Backward integration — forging plant in partial operation at Tunikibollaram + special processes (vacuum heat treatment, shot peening, NADCAP-accredited coatings via Azad VTC) brought in-house. Reduces external dependency, shortens lead times and captures margin previously going to third-party processors."

    mgmtNote:"Founder Rakesh Chopdar has assembled multiple tier-1 aerospace OEMs in a compressed window (MHI + Rolls-Royce + Pratt + Safran + GE + Honeywell + Eaton + EDF). Aggressive capex to build the 8-plant integrated complex is real (CFO/PAT swung to -89% FY26 on WC build), but underwritten by long-duration single-source contracts.",

    catNote:"Genuinely elite catalyst deck. Downgrade: valuation is very stretched (P/E 72, P/S 16, EV/EBITDA 44), ROCE at 11% still modest despite 37% OPM (capital intensity high at ₹603 cr rev on ₹2,200 cr assets), CFO/PAT -89% FY26 signals a heavy investment year. Wait for FCF to turn positive as commissioning completes." },
  { n:"INOX India", sector:"Industrial Gas · Cryogenic", metrics:"Mcap ₹18,209Cr · P/E 70 · ROCE 29% · OPM 22%",
    cat:9, mgmt:8.5, moat:9,
    hero:"US private space repeat mega-orders — High Value Order in Q4 FY26 followed by a further Mega order (>₹150 cr) in Q1 FY27 for 1,500 m³ cryogenic tanks, with more expected. At 21-25% margin on orders that can exceed ₹200 cr, a single repeat order can add EBITDA equivalent to roughly 12-15% of the current annual run-rate.",

  { n:"Sumitomo Chemical India", sector:"Pesticides / Agrochemicals", metrics:"Mcap ₹24,016Cr · P/E 44 · ROCE 21% · OPM 21%",
    cat:8, mgmt:9, moat:8.5,
    hero:"India elevated to TIER-1 for SCC's early-stage molecule pipeline — parent SCC has designated India as a TIER-1 COUNTRY for early-stage testing of new molecules from its global discovery pipeline, ON PAR WITH JAPAN, BRAZIL, AND NORTH AMERICA, and two molecules are already under trial. Structural elevation means SCIL gets access to SCC's newest proprietary chemistries YEARS EARLIER, pulling forward the domestic launch pipeline and reinforcing India's role as a manufacturing hub for the group.",

      "New royalty arrangement lifts margins on select products — SCC has WAIVED the obligation to buy technical goods from the parent for 2-3 selected products, replacing it with a small royalty capped at ₹2 cr, allowing SCIL to source from OUTSIDE. Arrangement directly IMPROVES the margin profile of these products and gives SCIL pricing flexibility to expand them in the domestic market.",
      "Tarapur two-molecule addition for parent supply — Board approved ~₹10 cr in January 2026 for fitment to manufacture ONE FUNGICIDE and ONE HERBICIDE at Tarapur for SCC, with commercialization targeted for Q4 FY2027-28. Adds two more CRAMS revenue streams at an existing site where multipurpose plant infrastructure is already in place.",
      "Biologicals portfolio scaling from FY27 — Biologicals already contribute 8-10% of revenue, WELL ABOVE THE INDUSTRY AVERAGE, and management expects both share and absolute revenue to grow meaningfully from FY27 onward after BIOSTIMULANT REGULATORY CLEARANCES came through in late 2025. With Barrix's regulatory approvals now largely restored and new products under evaluation from group company Valent BioSciences, biologicals is positioned to accelerate from a cleared regulatory base.",
      "Specialty mix shift to 30% of domestic revenue — specialty portfolio has STRUCTURALLY MOVED from 22-24% to 30% of domestic revenues over five years, and BRANDED FORMULATIONS reached 81% of domestic sales in FY26. Richer mix of patented and branded products LIFTS MARGIN QUALITY and reduces exposure to commoditized generic price cycles.",

      "CRAMS revenue step-up as projects complete — Sales to parent SCC currently run at ₹100-150 cr annually, and management expects growth from FY27 as projects under implementation get completed. With Bhavnagar second plant and Tarapur additions targeting FY27-FY28 commercialization, the CRAMS BASE IS SET TO EXPAND from a level that is already material to exports."

    moatNote:"Sumitomo Chemical Corp parent — access to global patented molecule pipeline (2 molecules in Tier-1 trial already) + specialty mix growing (81% branded) + regulated biologicals + captive Barrix technology + Valent BioSciences group products. Multi-decade Dahej hub creates manufacturing scale moat.",

  if (s >= 8) return 's80';
  if (s >= 7.5) return 's75';
  if (s >= 7) return 's70';
  if (s >= 6) return 's60';
  return 's55';
};

const verdictClass = v => {
  if (v === "ACCUMULATE") return "v-accumulate";
  if (v === "ACCUMULATE ON DIPS") return "v-dips";
  if (v === "HOLD") return "v-hold";
  if (v === "REDUCE") return "v-reduce";
  if (v === "AVOID") return "v-avoid";
  return "v-special";
};

let activeTier = 'all';

function tierMatch(scoreVal, tier) {
  if (tier === 'all') return true;
  if (tier === 'special') return scoreVal < 6;
  if (tier === '9') return scoreVal >= 9;      // Elite is 9.0+
  if (tier === '8.5') return scoreVal === 8.5;
  if (tier === '8') return scoreVal === 8;
  if (tier === '7.5') return scoreVal === 7.5;
  if (tier === '7') return scoreVal === 7;
  if (tier === '6') return scoreVal >= 6 && scoreVal < 7;
  return true;
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  const tierDim = document.getElementById('tierScoreDim').value;

  // Update the scope hint next to the legend
  const scopeLabels = { cat: 'Catalyst', mgmt: 'Management', moat: 'Moat' };
  document.getElementById('tierScope').textContent = '(applies to ' + scopeLabels[tierDim] + ' score)';

  let list = companies.filter(c => {
    const scoreForTier = c[tierDim];
    if (!tierMatch(scoreForTier, activeTier)) return false;
    if (search) {
      const hay = (c.n + ' ' + c.sector + ' ' + c.hero + ' ' + c.subs.join(' ') + ' ' + c.mgmtNote + ' ' + c.moatNote).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'name') return a.n.localeCompare(b.n);
    if (sort === 'cat') return b.cat - a.cat;
    if (sort === 'mgmt') return b.mgmt - a.mgmt;
    if (sort === 'moat') return b.moat - a.moat;
    return (b.cat + b.mgmt + b.moat) - (a.cat + a.mgmt + a.moat);
  });

  document.getElementById('count').textContent = list.length + ' of ' + companies.length + ' companies';

  document.getElementById('grid').innerHTML = list.map(c => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="company-name">${c.n}</div>
          <div class="sector">${c.sector}</div>
          <div class="metrics">${c.metrics}</div>
        </div>
      </div>
      <div class="scores">
        ${scoreCell('Catalyst', c.cat)}
        ${scoreCell('Mgmt', c.mgmt)}
        ${scoreCell('Moat', c.moat)}
      </div>
      <div class="hero">
        <div class="hero-label">★ HERO CATALYST</div>
        ${c.hero}
      </div>
      <ul class="subs">
        ${c.subs.map(s => `<li>${s}</li>`).join('')}
      </ul>
      <div class="assessment">
        <div class="assessment-row"><span class="assessment-label">Mgmt:</span> ${c.mgmtNote}</div>
        <div class="assessment-row"><span class="assessment-label">Moat:</span> ${c.moatNote}</div>
      </div>
      <div class="note">${c.catNote}</div>
      ${verdictMap[c.n] ? `
      <div class="compare">
        <div class="compare-row"><span class="compare-label">Ideal:</span><span class="compare-text">${verdictMap[c.n].ideal}</span></div>
        <div class="compare-row"><span class="compare-label">Real:</span><span class="compare-text">${verdictMap[c.n].real}</span></div>
      </div>
      <div class="verdict-pill ${verdictClass(verdictMap[c.n].v)}">
        <span class="verdict-text">${verdictMap[c.n].v}</span>
        <span class="verdict-note">${verdictMap[c.n].vn}</span>
      </div>` : ''}
    </div>
  `).join('');
}

// Company navigation — jump to next/previous card, aligned to its title
function cardDocTop(card) {
  return card.getBoundingClientRect().top + (window.pageYOffset || document.documentElement.scrollTop);
}
function currentCardIndex(cards) {
  const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
  const probe = scrollTop + 24; // small buffer so a card that is just barely off-top still counts
  let idx = 0;
  for (let i = 0; i < cards.length; i++) {
    if (cardDocTop(cards[i]) <= probe) idx = i;
    else break;
  }
  return idx;
}
function scrollToCard(dir) {
  const cards = Array.from(document.querySelectorAll('#grid .card'));
  if (!cards.length) return;
  const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
  // Snap-tolerance accounts for sticky-header offset (scroll-margin-top: 80)
  const headerOffset = 90;
  const cur = currentCardIndex(cards);
  const curTop = cardDocTop(cards[cur]);
  const aligned = Math.abs((scrollTop + headerOffset) - curTop) <= 20;
  let nextIdx;
  if (dir > 0) {
    nextIdx = aligned ? Math.min(cards.length - 1, cur + 1) : cur;
  } else {
    nextIdx = aligned ? Math.max(0, cur - 1) : cur;
  }
  cards[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
}
document.getElementById('prevCo').addEventListener('click', () => scrollToCard(-1));
document.getElementById('nextCo').addEventListener('click', () => scrollToCard(1));
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'j') { e.preventDefault(); scrollToCard(1); }
  else if (e.key === 'k') { e.preventDefault(); scrollToCard(-1); }
});

// Theme toggle with persistence
const themeBtn = document.getElementById('themeToggle');
function applyTheme(theme) {
  if (theme === 'dark') { document.body.classList.add('dark'); themeBtn.textContent = '☀ Light Mode'; }
  else { document.body.classList.remove('dark'); themeBtn.textContent = '🌙 Dark Mode'; }
}
try { applyTheme(localStorage.getItem('scorecard-theme') || 'light'); } catch(e) { applyTheme('light'); }
themeBtn.addEventListener('click', () => {
  const next = document.body.classList.contains('dark') ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('scorecard-theme', next); } catch(e) {}
});

// (auto-hide removed — header is now sticky-compact so scroll layout stays stable)

['search', 'sort', 'tierScoreDim'].forEach(id => document.getElementById(id).addEventListener('input', render));

document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.legend-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    activeTier = el.dataset.tier;
    render();
  });
});
